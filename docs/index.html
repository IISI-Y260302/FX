<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CBC 系統測試問題管理系統</title>

  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Vue 3 -->
  <script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>

  <!-- Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>

  <!-- SheetJS (Excel 匯出) -->
  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>

  <!-- jsPDF + AutoTable (PDF 匯出) -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.6.0/jspdf.plugin.autotable.min.js"></script>

  <!-- Google Identity Services (OAuth) -->
  <script src="https://accounts.google.com/gsi/client" async defer></script>

  <style>
    [v-cloak] { display: none; }
    .severity-嚴重         { background-color: #fee2e2; color: #991b1b; padding: 2px 8px; border-radius: 4px; }
    .severity-功能無法運作  { background-color: #ffedd5; color: #9a3412; padding: 2px 8px; border-radius: 4px; }
    .severity-中           { background-color: #fef9c3; color: #854d0e; padding: 2px 8px; border-radius: 4px; }
    .severity-低           { background-color: #dbeafe; color: #1e40af; padding: 2px 8px; border-radius: 4px; }
    .severity-建議         { background-color: #dcfce7; color: #166534; padding: 2px 8px; border-radius: 4px; }
    .status-Open    { background-color: #dbeafe; color: #1e40af; padding: 2px 8px; border-radius: 4px; }
    .status-Closed  { background-color: #dcfce7; color: #166534; padding: 2px 8px; border-radius: 4px; }
    .status-Reopen  { background-color: #ffedd5; color: #9a3412; padding: 2px 8px; border-radius: 4px; }
    .status-deleted { background-color: #e5e7eb; color: #6b7280; padding: 2px 8px; border-radius: 4px; }
  </style>
</head>
<body class="bg-gray-50 min-h-screen">
  <div id="app" v-cloak></div>
  <script src="app.js"></script>
</body>
</html>
